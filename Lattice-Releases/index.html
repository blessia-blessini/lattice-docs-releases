<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lattice — Releases</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 60px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 2em; }
    a { color: #0070f3; }
    #status { color: #666; font-style: italic; }
    #error  { color: #c00; }
  </style>
</head>
<body>
  <h1>Lattice</h1>
  <p>The Portable and Standard Markdown Editor.</p>

  <p id="status">Looking up the latest release&hellip;</p>
  <p id="error" hidden></p>

  <hr/>
  <small>
    Copyright &copy; 2026 Blessia Blessini &mdash;
    <a href="https://github.com/blessia-blessini">GitHub</a> &mdash;
    <a href="https://github.com/blessia-blessini/lattice-docs-releases/blob/main/README.md">License</a>
  </small>

  <script>
    const API = 'https://api.github.com/repos/blessia-blessini/lattice-docs-releases/contents/Lattice-Releases';
    const BASE = 'https://github.com/blessia-blessini/lattice-docs-releases/blob/main/Lattice-Releases';

    // Compare two vX.Y.Z strings numerically
    function semverCmp(a, b) {
      const parse = s => s.replace(/^assets-v/, '').split('.').map(Number);
      const [aMaj, aMin, aPat] = parse(a);
      const [bMaj, bMin, bPat] = parse(b);
      return bMaj - aMaj || bMin - aMin || bPat - aPat;
    }

    fetch(API)
      .then(r => {
        if (!r.ok) throw new Error(`GitHub API returned ${r.status}`);
        return r.json();
      })
      .then(items => {
        const releases = items
          .filter(i => i.type === 'dir' && /^assets-v\d+\.\d+\.\d+$/.test(i.name))
          .sort((a, b) => semverCmp(a.name, b.name));

        if (releases.length === 0) throw new Error('No release folders found yet.');

        const latest = releases[0].name;          // e.g. assets-v0.2.3
        const url = `${BASE}/${latest}/index.md`;

        document.getElementById('status').innerHTML =
          `Latest release: <strong>${latest.replace('assets-', '')}</strong><br>
           Redirecting to <a href="${url}">${url}</a>&hellip;`;

        setTimeout(() => { window.location.href = url; }, 1500);
      })
      .catch(err => {
        document.getElementById('status').hidden = true;
        const el = document.getElementById('error');
        el.hidden = false;
        el.textContent = `Could not determine latest release: ${err.message}`;
      });
  </script>
</body>
</html>
